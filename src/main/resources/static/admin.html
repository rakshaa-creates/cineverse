<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerse - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-black text-light mt-5 pt-4">
    <nav class="navbar navbar-expand-lg navbar-dark cineverse-nav fixed-top bg-dark border-bottom border-danger">
        <div class="container-fluid">
            <a class="navbar-brand text-danger fw-bold fs-3" href="/">CINEVERSE <span class="fs-6 text-white">| Admin</span></a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Back to Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row mb-3">
            <div class="col d-flex justify-content-between">
                <h2>Manage Movies</h2>
                <button class="btn btn-danger" onclick="openAddMovieModal()"><i class="fas fa-plus"></i> Add Movie</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Poster</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Genre</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="adminMoviesTable">
                    <!-- Data injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add/Edit Movie Modal -->
    <div class="modal fade" id="movieFormModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle">Add Movie</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="movieForm">
                        <input type="hidden" id="movieId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="movieTitle" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Category</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="movieCategory" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Genre</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="movieGenre">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Release Year</label>
                                <input type="number" class="form-control bg-dark text-light border-secondary" id="movieYear">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Rating</label>
                                <input type="number" step="0.1" class="form-control bg-dark text-light border-secondary" id="movieRating">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control bg-dark text-light border-secondary" id="movieDesc" rows="3"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Poster URL</label>
                                <input type="url" class="form-control bg-dark text-light border-secondary" id="moviePoster">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Trailer Embed URL</label>
                                <input type="url" class="form-control bg-dark text-light border-secondary" id="movieTrailer">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Director</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="movieDirector">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cast</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary" id="movieCast">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="saveMovie()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        $(document).ready(function() {
            fetchAdminMovies();
        });
    </script>
</body>
</html>
